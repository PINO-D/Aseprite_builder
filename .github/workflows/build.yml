permissions:
  contents: write  # 🔥 解决权限错误

name: Build a specified version

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'the tag(version) of the Aseprite'
        required: true

jobs:
  build:
    runs-on: windows-2025
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # 🔥 消除 Node.js 警告
    strategy:
      fail-fast: false
      matrix:
        build_type: [Release]
        enable_ui: [on]

    steps:
    - name: Get Release Body
      id: get-content
      shell: bash
      run: |
        body=$(curl -s https://api.github.com/repos/aseprite/aseprite/releases/tags/${{ github.event.inputs.tag_name }} | jq -r '.body | gsub("\n";"\\n") | gsub("\"";"\\\"")')
        echo "body-content=$body" >> "$GITHUB_OUTPUT"

    - uses: actions/checkout@v4
      with:
        repository: 'aseprite/aseprite'
        submodules: 'recursive'
        ref: ${{ github.event.inputs.tag_name }}

    - uses: seanmiddleditch/gha-setup-ninja@master
    - uses: ilammy/msvc-dev-cmd@v1

    - name: Download Skia
      shell: bash
      run: |
        curl -L -o skia.zip https://github.com/aseprite/skia/releases/download/m124-08a5439a6b/Skia-Windows-Release-x64.zip
        7z x skia.zip -oskia -y
        SKIA_DIR="$(pwd)/skia"

        cmake -S . -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
          -DENABLE_CCACHE=off \
          -DLAF_BACKEND=skia \
          -DSKIA_DIR="$SKIA_DIR" \
          -DSKIA_LIBRARY_DIR="$SKIA_DIR/out/Release-x64" \
          -DSKIA_LIBRARY="$SKIA_DIR/out/Release-x64/skia.lib" \
          -DENABLE_UPDATER=OFF \
          -DUSE_SHARED_CURL=OFF \
          -DCMAKE_USE_OPENSSL=OFF \
          -DCMAKE_USE_SCHANNEL=ON

    - name: Build
      shell: bash
      run: ninja -C build

    - name: Package
      shell: bash
      run: |
        cd build/bin
        7z a -tzip "${{ github.workspace }}/aseprite-${{ github.event.inputs.tag_name }}.zip" data/ aseprite.exe

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        tag_name: ${{ github.event.inputs.tag_name }}
        name: Aseprite ${{ github.event.inputs.tag_name }}
        body: ${{ steps.get-content.outputs.body-content }}
        draft: true
        prerelease: false
        files: ${{ github.workspace }}/aseprite-${{ github.event.inputs.tag_name }}.zip
