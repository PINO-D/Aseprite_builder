name: Build a specified version

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'the tag(version) of the Aseprite'
        required: true

jobs:
  build:
    runs-on: windows-2025
    strategy:
      fail-fast: false
      matrix:
        build_type: [Release]
        enable_ui: [on]

    steps:
    # 获得 Release 信息
    - name: Get Release Body & Repo Name
      id: get-content
      shell: bash
      run: |
        body=$(curl -s https://api.github.com/repos/aseprite/aseprite/releases/tags/${{ github.event.inputs.tag_name }} | jq -r '.body')
        echo "body-content=$body" >> "$GITHUB_OUTPUT"
        repo_name="${{ github.repository }}"
        repo_name="${repo_name#${{ github.repository_owner }}/}"
        echo "repo-name=$repo_name" >> "$GITHUB_OUTPUT"

    # 检出源码（升级到 v4，解决 Node.js 20 警告）
    - uses: actions/checkout@v4
      with:
        repository: 'aseprite/aseprite'
        submodules: 'recursive'
        ref: ${{ github.event.inputs.tag_name }}

    # Ninja 构建工具
    - uses: seanmiddleditch/gha-setup-ninja@master

    # MSVC 编译环境
    - uses: ilammy/msvc-dev-cmd@v1

    # 下载 Skia 并 CMake 构建
    - name: Download Skia & Configure
      shell: bash
      run: |
        curl -L -o skia.zip https://github.com/aseprite/skia/releases/download/m124-08a5439a6b/Skia-Windows-Release-x64.zip
        7z x skia.zip -oskia -y
        
        SKIA_DIR="$(pwd)/skia"
        
        cmake -S . -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
          -DENABLE_CCACHE=off \
          -DLAF_BACKEND=skia \
          -DSKIA_DIR="$SKIA_DIR" \
          -DSKIA_LIBRARY_DIR="$SKIA_DIR/out/Release-x64" \
          -DSKIA_LIBRARY="$SKIA_DIR/out/Release-x64/skia.lib" \
          -DENABLE_UPDATER=OFF \
          -DUSE_SHARED_CURL=OFF \
          -DCMAKE_USE_OPENSSL=OFF \
          -DCMAKE_USE_SCHANNEL=ON

    # 编译（核心步骤，稳定不重试）
    - name: Build Aseprite
      shell: bash
      run: ninja -C build

    # 打包（修复路径问题，避免重试）
    - name: Package
      shell: bash
      run: |
        cd build/bin
        7z a -tzip "${{ github.workspace }}/aseprite-${{ github.event.inputs.tag_name }}.zip" data/ aseprite.exe

    # 上传 Release（升级到 v2，解决 Node 警告）
    - name: Create Draft Release
      uses: softprops/action-gh-release@v2
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        tag_name: ${{ github.event.inputs.tag_name }}
        name: Aseprite ${{ github.event.inputs.tag_name }}
        body: ${{ steps.get-content.outputs.body-content }}
        draft: true
        prerelease: false
        files: ${{ github.workspace }}/aseprite-${{ github.event.inputs.tag_name }}.zip
