permissions:
  contents: write

name: Build Aseprite (Final No DLL Error)

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Aseprite 版本号/tag'
        required: true

jobs:
  build:
    runs-on: windows-2025
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Aseprite Code
        uses: actions/checkout@v4
        with:
          repository: aseprite/aseprite
          submodules: recursive
          ref: ${{ github.event.inputs.tag_name }}

      - name: Setup Ninja
        uses: seanmiddleditch/gha-setup-ninja@master

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Download & Extract Skia
        shell: bash
        run: |
          curl -L -o skia.zip https://github.com/aseprite/skia/releases/download/m124-08a5439a6b/Skia-Windows-Release-x64.zip
          7z x skia.zip -oskia -y

      - name: CMake Configure (No OpenSSL)
        shell: bash
        run: |
          cmake -S . -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DLAF_BACKEND=skia \
          -DSKIA_DIR="${{ github.workspace }}/skia" \
          -DSKIA_LIBRARY_DIR="${{ github.workspace }}/skia/out/Release-x64" \
          -DSKIA_LIBRARY="${{ github.workspace }}/skia/out/Release-x64/skia.lib" \
          -DENABLE_UPDATER=OFF \
          -DUSE_SHARED_CURL=OFF \
          -DCMAKE_USE_OPENSSL=OFF \
          -DCMAKE_USE_SCHANNEL=ON \
          -DBUILD_SHARED_LIBS=OFF

      - name: Build Aseprite
        shell: bash
        run: ninja -C build

      - name: Package ZIP
        shell: bash
        run: |
          cd build/bin
          ZIP="aseprite-${{ github.event.inputs.tag_name }}.zip"
          7z a -tzip "$ZIP" data/ aseprite.exe
          cp "$ZIP" "$GITHUB_WORKSPACE/"
          echo "FILE_PATH=$GITHUB_WORKSPACE/$ZIP" >> $GITHUB_ENV

      - name: Create Release with File
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ github.event.inputs.tag_name }}
          name: Aseprite ${{ github.event.inputs.tag_name }}
          body: "Automatic build (No OpenSSL dependency)"
          draft: true
          files: ${{ env.FILE_PATH }}
