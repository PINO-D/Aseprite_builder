name: Build a specified version2

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'the tag(version) of the Aseprite'
        required: true

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest]
        build_type: [Release]
        enable_ui: [on]
        include:
          - os: windows-latest
            build_type: Release
            enable_ui: on

    steps:

    # 获取 Release 的 Body 与仓库名称
    - name: 获得 Release 的 Body 与仓库名称
      id: get-content
      shell: bash
      run: |
        body=$(curl -s https://api.github.com/repos/aseprite/aseprite/releases/tags/${{ github.event.inputs.tag_name }} | jq -r '.body')
        echo "body-content=$(echo $body)" >> $GITHUB_OUTPUT 
        echo $body
        GITHUB_REPOSITORY="${{ github.repository }}"
        REPO_NAME="${GITHUB_REPOSITORY#${{ github.repository_owner }}/}"
        echo "repo-name=$(echo $REPO_NAME)" >> $GITHUB_OUTPUT 
        echo $REPO_NAME

    # 检出 Aseprite 源码
    - uses: actions/checkout@v3
      with:
        repository: 'aseprite/aseprite'
        submodules: 'recursive'
        ref: ${{ github.event.inputs.tag_name }}

    # 设置 Ninja 构建系统
    - uses: seanmiddleditch/gha-setup-ninja@master

    # 设置 MSVC 编译环境
    - uses: ilammy/msvc-dev-cmd@v1

    # 获取 skia 并生成 Makefile
    - name: 获取 skia 并生成 Makefile
      shell: bash
      run: |
        if [[ "${{ runner.os }}" == "Windows" ]] ; then
          export enable_ccache=off
        else
          export enable_ccache=on
        fi

        curl -L -o skia.zip https://github.com/aseprite/skia/releases/download/m124-08a5439a6b/Skia-Windows-Release-x64.zip
        7z x skia.zip -oskia

        SKIA_DIR="$(pwd)/skia"

        # 清理可能存在的缓存和构建目录
        echo "=== 清理旧的构建文件 ==="
        rm -rf build
        rm -rf CMakeCache.txt
        rm -rf CMakeFiles
        
        echo "=== 开始 CMake 配置 ==="
        cmake -S . -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
          -DENABLE_CCACHE=$enable_ccache \
          -DLAF_BACKEND=skia \
          -DSKIA_DIR=$SKIA_DIR \
          -DSKIA_LIBRARY_DIR=$SKIA_DIR/out/Release-x64 \
          -DSKIA_LIBRARY=$SKIA_DIR/out/Release-x64/skia.lib \
          -DENABLE_UI=${{ matrix.enable_ui }} \
          -DENABLE_UPDATER=OFF \
          -DENABLE_NEWS=OFF \
          -DUSE_SHARED_CURL=OFF \
          -DCURL_USE_OPENSSL=OFF \
          -DCURL_USE_SCHANNEL=ON \
          -DCURL_DISABLE_OPENSSL_AUTO_LOAD_CONFIG=ON
        
        echo "=== 检查 CMake 配置输出中的 SSL 后端 ==="
        if [ -f build/CMakeCache.txt ]; then
          echo "查找 CURL SSL 相关配置:"
          grep -i "CURL.*SSL\|CURL.*SCHANNEL\|CURL.*OPENSSL" build/CMakeCache.txt || echo "未找到相关配置"
        fi

    # 编译
    - name: 编译
      shell: bash
      run: |
        cd build && ninja

    # 验证依赖 - 检查是否还需要 OpenSSL DLL
    - name: 验证编译结果
      shell: bash
      run: |
        cd build/bin
        echo "=== 检查 aseprite.exe 依赖的 DLL ==="
        dumpbin //dependents aseprite.exe | tee dependencies.txt
        echo ""
        echo "=== 完整的依赖列表 ==="
        cat dependencies.txt
        echo ""
        echo "=== 检查是否依赖 OpenSSL ==="
        if grep -i "libcrypto\|libssl\|openssl" dependencies.txt; then
          echo "❌ 错误: 仍然依赖 OpenSSL DLL!"
          echo "请检查上面的 CMake 配置输出"
          exit 1
        else
          echo "✅ 成功: 不依赖 OpenSSL DLL!"
          echo "✅ 使用 Windows 原生加密库"
        fi

    # 打包
    - name: 打包
      shell: bash
      run: |
        REPO_NAME=${{ steps.get-content.outputs.repo-name }}
        cd D:/a/$REPO_NAME/$REPO_NAME/build/bin/
        7z a -tzip aseprite.${{ github.event.inputs.tag_name }}.zip data aseprite.exe
        cp aseprite.${{ github.event.inputs.tag_name }}.zip D:/a/

    # 草拟 Release 并且上传文件
    - name: 草拟 Release 并且上传文件
      uses: softprops/action-gh-release@v1
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        tag_name: ${{ github.event.inputs.tag_name }}
        name: Aseprite ${{ github.event.inputs.tag_name }}
        body: ${{ steps.get-content.outputs.body-content }}
        draft: true  # ⚠️ 为了遵守 EULA，保持为 draft，私有仓库才可发布
        prerelease: false
        files: |
          D:/a/aseprite.${{ github.event.inputs.tag_name }}.zip
